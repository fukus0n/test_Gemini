<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GG FES タイムテーブル</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* タイムテーブル用のカスタムスタイル */
    .time-axis {
      position: sticky;
      left: 0;
      background: white;
      z-index: 10;
      width: 50px;
      border-right: 1px solid #e2e8f0;
    }
    .stage-column {
      position: relative;
      min-width: 130px;
      flex: 1;
      border-right: 1px dashed #e2e8f0;
    }
    .stage-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      text-align: center;
      padding: 0.5rem;
      font-weight: bold;
      border-bottom: 2px solid #e2e8f0;
    }
    .act-card {
      position: absolute;
      left: 4px;
      right: 4px;
      border-radius: 6px;
      padding: 4px;
      font-size: 0.75rem;
      line-height: 1.2;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .act-card:active {
      transform: scale(0.95);
    }
    .act-selected {
      box-shadow: 0 0 0 2px #ef4444; /* マイテーブル選択時は赤枠 */
    }
    /* スクロールバー非表示（モバイル向けにスッキリさせる） */
    ::-webkit-scrollbar {
      display: none;
    }
    .hidden-tab {
      display: none !important;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col h-screen">

  <!-- ヘッダー -->
  <header class="bg-white shadow-sm p-3 z-30 relative">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
      <h1 class="text-lg font-bold text-slate-800">GG FES Timetable</h1>
      <div class="flex gap-2">
        <button id="btnD1" class="px-4 py-1.5 bg-indigo-600 text-white rounded-full text-sm font-bold shadow-sm transition-colors" onclick="switchDay('d1')">Day 1</button>
        <button id="btnD2" class="px-4 py-1.5 bg-slate-100 text-slate-500 rounded-full text-sm font-bold transition-colors" onclick="switchDay('d2')">Day 2</button>
      </div>
    </div>
  </header>

  <!-- タブナビゲーション -->
  <nav class="bg-white border-b flex max-w-4xl mx-auto w-full">
    <button id="tabTime" class="flex-1 py-3 text-center font-bold border-b-2 border-indigo-600 text-indigo-600 transition-colors" onclick="switchTab('timetable')">タイムテーブル</button>
    <button id="tabArtist" class="flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500 transition-colors" onclick="switchTab('artist')">出演者一覧</button>
  </nav>

  <!-- メインコンテンツ -->
  <main class="flex-1 overflow-hidden relative max-w-4xl mx-auto w-full bg-white">
    <!-- タイムテーブル画面 -->
    <div id="viewTimetable" class="h-full flex flex-col">
      <div class="flex flex-1 overflow-hidden relative">
        <!-- 時間軸 -->
        <div id="timeAxis" class="time-axis shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]"></div>
        <!-- ステージ領域 -->
        <div id="stagesContainer" class="flex flex-1 overflow-x-auto relative scroll-smooth">
          <!-- JSで描画 -->
        </div>
      </div>
    </div>

    <!-- 出演者一覧画面 -->
    <div id="viewArtist" class="h-full overflow-y-auto p-4 hidden-tab bg-slate-50">
      <div id="artistListContainer" class="pb-10">
        <!-- JSで描画 -->
      </div>
    </div>
  </main>

  <!-- モーダル（詳細画面） -->
  <div id="actModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center">
    <div id="modalOverlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
    <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-2xl p-6 relative z-10 transform transition-transform translate-y-full sm:translate-y-0 shadow-2xl" id="modalContent">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 p-1 bg-slate-100 rounded-full">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
      
      <div class="flex items-center gap-2 mb-3 mt-1">
        <span id="modalStage" class="text-xs font-bold px-2.5 py-1 rounded-md text-white shadow-sm">STAGE</span>
        <span id="modalTime" class="text-sm text-slate-500 font-mono bg-slate-100 px-2 py-1 rounded">00:00 - 00:00</span>
      </div>
      
      <h2 id="modalName" class="text-2xl font-black mb-6 text-slate-800 leading-tight">Artist Name</h2>
      
      <button id="btnToggleSelect" class="w-full py-3.5 rounded-xl font-bold text-white transition-all transform active:scale-95 shadow-md">
        マイテーブルに追加
      </button>
    </div>
  </div>

  <script>
    // --- 1. グローバル変数 ---
    let dataDay1 = {};
    let dataDay2 = {};
    let currentDay = "d1";
    let currentTab = "timetable";
    let selectedActMap = new Map(); // マイテーブルに登録したアクトの保存用

    // タイムテーブルの表示設定
    const MIN_TIME = 9 * 60;   // 開始時間 09:00
    const MAX_TIME = 21 * 60;  // 終了時間 21:00
    const PIXELS_PER_MINUTE = 4; // 1分あたりの高さ(px)。広げたい場合は数字を大きくする

    const STAGE_ORDER = ["mori", "yoshi", "vivid"];
    const STAGE_NAMES = {
      mori: "MORI",
      yoshi: "YOSHI",
      vivid: "VIVID"
    };
    const STAGE_COLORS = {
      mori: "#4ade80",   // 緑
      yoshi: "#60a5fa",  // 青
      vivid: "#f472b6"   // ピンク
    };

    const MODAL = document.getElementById("actModal");
    const MODAL_CONTENT = document.getElementById("modalContent");
    let currentModalAct = null;

    // --- 2. ユーティリティ関数 ---
    function formatTime(h, m) { 
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`; 
    }
    
    // マイテーブルの保存 (ローカルストレージ)
    function saveData() { 
      try { 
        localStorage.setItem("gg_fes_acts", JSON.stringify(Object.fromEntries(selectedActMap))); 
      } catch(e) { console.error("Save failed", e); } 
    }

    // 🌟 追加した「五十音順判定」関数
    function getYomiGroup(name) {
      if (!name) return "その他";
      
      // 今回は簡易的に「名前の先頭の文字」でグループ分けします。
      // ※英語名などの場合はアルファベット、記号は「その他」に分類されます。
      const c = name.charAt(0);
      
      if ("あいうえおぁぃぅぇぉ".includes(c)) return "あ行";
      if ("かきくけこがぎぐげご".includes(c)) return "か行";
      if ("さしすせそざじずぜぞ".includes(c)) return "さ行";
      if ("たちつてとだぢづでどっ".includes(c)) return "た行";
      if ("なにぬねの".includes(c)) return "な行";
      if ("はひふへほばびぶべぼぱぴぷぺぽ".includes(c)) return "は行";
      if ("まみむめも".includes(c)) return "ま行";
      if ("やゆよゃゅょ".includes(c)) return "や行";
      if ("らりるれろ".includes(c)) return "ら行";
      if ("わをん".includes(c)) return "わ行";
      if (/[A-Za-z]/.test(c)) return c.toUpperCase(); // アルファベット
      return "その他";
    }

    // --- 3. データパース処理 ---
    function parseActs(rawObj, dayId) {
      const result = {};
      for (const stage of STAGE_ORDER) {
        result[stage] = [];
        if (!rawObj[stage]) continue;
        
        const actStrings = rawObj[stage].split('|');
        for (const actStr of actStrings) {
          const parts = actStr.split(',');
          if (parts.length < 5) continue;
          
          const name = parts[0];
          const sh = parseInt(parts[1], 10);
          const sm = parseInt(parts[2], 10);
          const eh = parseInt(parts[3], 10);
          const em = parseInt(parts[4], 10);
          
          const startMin = sh * 60 + sm;
          const endMin = eh * 60 + em;
          const id = `${dayId}_${stage}_${name}`;

          result[stage].push({
            id: id,
            day: dayId,
            stage: stage,
            name: name,
            startH: sh, startM: sm,
            endH: eh, endM: em,
            startTotal: startMin,
            endTotal: endMin
          });
        }
      }
      return result;
    }

    // --- 4. 初期化・描画処理 ---

        vivid: "あまいものつめあわせ,10,25,10,40|Mooove!,10,40,10,55|ガガピエロ,10,55,11,10|#ドレミファソラシード,11,10,11,25|ideal peco,11,25,11,40|あくしゅ！,11,40,11,55|Drug&Drop,11,55,12,10|Titi,12,10,12,25|make mie,12,25,12,40|なみだ色の消しごむ,12,40,12,55|しろもん,12,55,13,10|I'mew（あいみゅう）,13,10,13,25|SAI 2Rium,13,25,13,40|LADYBABY,13,40,13,55|Bunny La Crew,13,55,14,15|NANONI,14,15,14,30|Alloy,14,30,14,45|Axelight,14,45,15,00|マージナルマン,15,00,15,15|1000日後の話。,15,15,15,30|Mirror,Mirror,15,30,15,50|キングサリ,15,50,16,10|終わらないで、夜,16,10,16,25|COMIQ ON!,16,25,16,40|ノルニル,16,40,16,55|ベンジャス！,16,55,17,15|衛星とカラテア,17,15,17,35|太陽と踊れ月夜に唄え,17,35,17,55|PIGGS,17,55,18,15|ジエメイ,18,15,18,35|二丁目の魁カミングアウト,18,35,18,55|Kolokol,18,55,19,15|Ringwanderung,19,15,19,35|Pimm's,19,35,19,55"
      };

      const rawDay2 = {
        mori: "君と見るそら,10,00,10,25|RAViDAVi,10,25,10,50|KATACOTO＊BANK,10,50,11,15|Merry BAD TUNE.,11,15,11,40|JamsCollection,11,40,12,05|Peel the Apple,12,05,12,30|NEO JAPONISM,12,30,12,55|真っ白なキャンバス,12,55,13,25|FES☆TIVE,13,25,13,50|iLiFE!,13,50,14,20|夜光性アミューズ,14,20,14,45|高嶺のなでしこ,14,45,15,10|アンスリューム,15,10,15,35|まねきケチャ,15,35,16,00|Task have Fun,16,00,16,25|かすみ草とステラ,16,25,16,50|Devil ANTHEM.,16,50,17,15|chuLa,17,15,17,40|Appare!,17,40,18,10|ナナランド,18,10,18,35|のんふぃく！,18,35,19,00|マーキュロ,19,00,19,25|NANIMONO,19,25,19,50|STAiNY,19,50,20,15",
        yoshi: "あまいものつめあわせ,10,30,10,50|#よーよーよー,10,50,11,10|ルージュブック,11,10,11,30|ZOC,11,30,11,55|CANDY TUNE,11,55,12,20|SWEET STEADY,12,20,12,45|#ババババンビ,12,45,13,10|MyDearDarlin',13,10,13,35|INUWASI,13,35,14,00|タイトル未定,14,00,14,25|神使轟く、激情の如く。,14,25,14,50|ドラマチックレコード,14,50,15,15|SUPER☆GiRLS,15,15,15,40|手羽先センセーション,15,40,16,05|シンデレラ宣言！,16,05,16,30|#Mooove!,16,30,16,50|点染テンセイ少女。,16,50,17,10|テラス×テラス,17,10,17,30|UtaGe!,17,30,17,50|Falench.,17,50,18,10|#PEXACOA,18,10,18,30|I MY ME MINE,18,30,18,50|のらりくらり,18,50,19,10|ポンコツコンポ,19,10,19,30",
        vivid: "えあらびゅー,10,15,10,30|Re:INCARNATION,10,30,10,45|メイビーME,10,45,11,00|TEARS-ティアーズ-,11,00,11,15|Bety,11,15,11,30|にっぽん！真骨頂,11,30,11,45|ミリオン！〜Million My Harem〜,11,45,12,00|#ピコリフ,12,00,12,15|I'mew（あいみゅう）,12,15,12,30|しろもん,12,30,12,45|なんキニ！,12,45,13,00|Bunny La Crew,13,00,13,15|透色ドロップ,13,15,13,35|Lily of the valley,13,35,13,50|ベンジャス！,13,50,14,10|太陽と踊れ月夜に唄え,14,10,14,30|ジエメイ,14,30,14,50|二丁目の魁カミングアウト,14,50,15,10|PRSMIN,15,10,15,30|MEWM,15,30,15,50|PIGGS,15,50,16,10|MIGMA SHELTER,16,10,16,30|Mirror,Mirror,16,30,16,50|衛星とカラテア,16,50,17,10|Ringwanderung,17,10,17,30|キングサリ,17,30,17,50|Kolokol,17,50,18,10|NEO KISSA,18,10,18,25|THE ORCHESTRA TOKYO,18,25,18,45|yosugala,18,45,19,05|Quubi,19,05,19,25|Merry BAD TUNE.（後夜祭）,19,25,19,45|INUWASI（後夜祭）,19,45,20,05"
      };

      // グローバル変数へ代入
      dataDay1 = parseActs(rawDay1, "d1");
      dataDay2 = parseActs(rawDay2, "d2");
    }

    function loadSavedData() {
      try {
        const saved = localStorage.getItem("gg_fes_acts");
        if (saved) {
          const obj = JSON.parse(saved);
          selectedActMap = new Map(Object.entries(obj));
        }
      } catch (e) { console.error("Load failed", e); }
    }

    function drawTimeAxis() {
      const axis = document.getElementById("timeAxis");
      axis.innerHTML = "";
      
      const headerSpace = document.createElement("div");
      headerSpace.className = "h-[42px] border-b-2 border-slate-200"; // ヘッダーの高さを合わせる
      axis.appendChild(headerSpace);

      const totalMins = MAX_TIME - MIN_TIME;
      const height = totalMins * PIXELS_PER_MINUTE;
      
      const container = document.createElement("div");
      container.style.height = `${height}px`;
      container.style.position = "relative";
      
      for (let h = 9; h <= 21; h++) {
        const min = h * 60;
        if (min < MIN_TIME || min > MAX_TIME) continue;
        
        const top = (min - MIN_TIME) * PIXELS_PER_MINUTE;
        
        const label = document.createElement("div");
        label.className = "absolute text-[10px] text-slate-400 font-mono text-center w-full";
        label.style.top = `${top - 7}px`; // 縦の中央に合わせる
        label.textContent = `${h}:00`;
        container.appendChild(label);
      }
      axis.appendChild(container);
    }

    function drawTimetable() {
      const container = document.getElementById("stagesContainer");
      container.innerHTML = "";
      
      const dayData = currentDay === "d1" ? dataDay1 : dataDay2;
      const totalMins = MAX_TIME - MIN_TIME;
      const height = totalMins * PIXELS_PER_MINUTE;

      STAGE_ORDER.forEach(stageKey => {
        const acts = dayData[stageKey] || [];
        
        const col = document.createElement("div");
        col.className = "stage-column";
        
        const header = document.createElement("div");
        header.className = "stage-header h-[42px] flex items-center justify-center text-sm";
        header.style.color = STAGE_COLORS[stageKey];
        header.textContent = STAGE_NAMES[stageKey];
        col.appendChild(header);

        const content = document.createElement("div");
        content.style.height = `${height}px`;
        content.style.position = "relative";

        // 背景の罫線（30分ごと）
        for (let m = MIN_TIME; m <= MAX_TIME; m += 30) {
          const line = document.createElement("div");
          line.className = "absolute w-full border-b border-slate-100";
          line.style.top = `${(m - MIN_TIME) * PIXELS_PER_MINUTE}px`;
          content.appendChild(line);
        }

        // アクト（出演枠）の配置
        acts.forEach(act => {
          const top = (act.startTotal - MIN_TIME) * PIXELS_PER_MINUTE;
          const h = (act.endTotal - act.startTotal) * PIXELS_PER_MINUTE;
          
          const el = document.createElement("div");
          el.className = "act-card flex flex-col justify-center";
          el.style.top = `${top}px`;
          el.style.height = `${h - 2}px`; // 下に2pxの隙間をあける
          
          const isSelected = selectedActMap.has(act.id);
          // 選択時は背景を濃く、非選択時は透明度を持たせる
          el.style.backgroundColor = isSelected ? STAGE_COLORS[stageKey] : `${STAGE_COLORS[stageKey]}22`; 
          el.style.color = isSelected ? "#fff" : "#1e293b";
          if (isSelected) el.classList.add("act-selected");
          
          el.innerHTML = `
            <div class="font-bold truncate text-center">${act.name}</div>
            <div class="text-[9px] opacity-80 text-center font-mono mt-0.5">${formatTime(act.startH, act.startM)}-${formatTime(act.endH, act.endM)}</div>
          `;
          
          el.onclick = () => openModal(act);
          content.appendChild(el);
        });

        col.appendChild(content);
        container.appendChild(col);
      });
    }

    function drawArtistList() {
      const container = document.getElementById("artistListContainer");
      container.innerHTML = "";
      
      const dayData = currentDay === "d1" ? dataDay1 : dataDay2;
      
      // その日の全アクトをフラットな配列にする
      let allActs = [];
      STAGE_ORDER.forEach(stageKey => {
        allActs = allActs.concat(dayData[stageKey] || []);
      });
      
      // getYomiGroup 関数を使ってグループ分け
      const groups = {};
      allActs.forEach(act => {
        const group = getYomiGroup(act.name);
        if (!groups[group]) groups[group] = [];
        groups[group].push(act);
      });
      
      // グループ名でソートして描画
      Object.keys(groups).sort().forEach(groupName => {
        const h3 = document.createElement("h3");
        h3.className = "text-sm font-black mt-6 mb-2 text-slate-400 pl-2";
        h3.textContent = groupName;
        container.appendChild(h3);
        
        const list = document.createElement("div");
        list.className = "bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm";
        
        // グループ内で名前順にソート
        groups[groupName].sort((a, b) => a.name.localeCompare(b.name, 'ja')).forEach((act, idx) => {
          if (idx > 0) {
            const line = document.createElement("div");
            line.className = "border-t border-slate-100 mx-4";
            list.appendChild(line);
          }
          
          const item = document.createElement("div");
          item.className = "flex justify-between items-center p-4 hover:bg-slate-50 cursor-pointer active:bg-slate-100 transition-colors";
          item.onclick = () => openModal(act);
          
          const isSelected = selectedActMap.has(act.id);
          
          item.innerHTML = `
            <div>
              <div class="font-bold flex items-center gap-2 text-slate-800">
                ${act.name}
                ${isSelected ? '<span class="text-[10px] bg-red-50 text-red-500 border border-red-200 px-1.5 py-0.5 rounded">追加済み</span>' : ''}
              </div>
              <div class="text-xs text-slate-500 mt-1.5 flex items-center gap-2">
                <span class="px-1.5 py-0.5 rounded text-[10px] font-bold text-white shadow-sm" style="background-color: ${STAGE_COLORS[act.stage]}">${STAGE_NAMES[act.stage]}</span>
                <span class="font-mono text-slate-400">${formatTime(act.startH, act.startM)} - ${formatTime(act.endH, act.endM)}</span>
              </div>
            </div>
            <div class="text-slate-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
          `;
          list.appendChild(item);
        });
        
        container.appendChild(list);
      });
      
      // リストが空の場合の対応
      if (Object.keys(groups).length === 0) {
        container.innerHTML = `<div class="text-center text-slate-400 py-10">データがありません</div>`;
      }
    }

    // --- 5. UI操作 ---
    function switchDay(day) {
      currentDay = day;
      
      const btnD1 = document.getElementById("btnD1");
      const btnD2 = document.getElementById("btnD2");
      
      if (day === "d1") {
        btnD1.className = "px-4 py-1.5 bg-indigo-600 text-white rounded-full text-sm font-bold shadow-sm transition-colors";
        btnD2.className = "px-4 py-1.5 bg-slate-100 text-slate-500 hover:bg-slate-200 rounded-full text-sm font-bold transition-colors";
      } else {
        btnD1.className = "px-4 py-1.5 bg-slate-100 text-slate-500 hover:bg-slate-200 rounded-full text-sm font-bold transition-colors";
        btnD2.className = "px-4 py-1.5 bg-indigo-600 text-white rounded-full text-sm font-bold shadow-sm transition-colors";
      }
      
      refreshCurrentView();
    }

    function switchTab(tab) {
      currentTab = tab;
      
      const tabTime = document.getElementById("tabTime");
      const tabArtist = document.getElementById("tabArtist");
      const viewTime = document.getElementById("viewTimetable");
      const viewArtist = document.getElementById("viewArtist");
      
      if (tab === "timetable") {
        tabTime.className = "flex-1 py-3 text-center font-bold border-b-2 border-indigo-600 text-indigo-600 transition-colors";
        tabArtist.className = "flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500 hover:bg-slate-50 transition-colors";
        viewTime.classList.remove("hidden-tab");
        viewArtist.classList.add("hidden-tab");
      } else {
        tabArtist.className = "flex-1 py-3 text-center font-bold border-b-2 border-indigo-600 text-indigo-600 transition-colors";
        tabTime.className = "flex-1 py-3 text-center font-bold border-b-2 border-transparent text-slate-500 hover:bg-slate-50 transition-colors";
        viewArtist.classList.remove("hidden-tab");
        viewTime.classList.add("hidden-tab");
      }
      
      refreshCurrentView();
    }

    function refreshCurrentView() {
      if (currentTab === "timetable") {
        drawTimeAxis();
        drawTimetable();
      } else {
        drawArtistList();
      }
    }

    // --- 6. モーダル操作 ---
    function openModal(act) {
      currentModalAct = act;
      
      document.getElementById("modalName").textContent = act.name;
      document.getElementById("modalTime").textContent = `${formatTime(act.startH, act.startM)} - ${formatTime(act.endH, act.endM)}`;
      
      const stageBadge = document.getElementById("modalStage");
      stageBadge.textContent = STAGE_NAMES[act.stage];
      stageBadge.style.backgroundColor = STAGE_COLORS[act.stage];
      
      updateModalButton();
      
      MODAL.classList.remove("hidden");
      // 少し遅延させてCSSアニメーションを発火
      setTimeout(() => {
        MODAL_CONTENT.classList.remove("translate-y-full");
        document.getElementById("modalOverlay").classList.add("opacity-100");
      }, 10);
    }

    function closeModal() {
      MODAL_CONTENT.classList.add("translate-y-full");
      document.getElementById("modalOverlay").classList.remove("opacity-100");
      setTimeout(() => {
        MODAL.classList.add("hidden");
        currentModalAct = null;
      }, 300); // Tailwindのtransitionに合わせる
    }

    function updateModalButton() {
      if (!currentModalAct) return;
      const btn = document.getElementById("btnToggleSelect");
      const isSelected = selectedActMap.has(currentModalAct.id);
      
      if (isSelected) {
        btn.textContent = "マイテーブルから削除";
        btn.className = "w-full py-3.5 rounded-xl font-bold text-red-600 bg-red-50 border-2 border-red-200 transition-all transform active:scale-95";
      } else {
        btn.textContent = "マイテーブルに追加";
        btn.className = "w-full py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-all transform active:scale-95 shadow-md";
      }
    }

    document.getElementById("btnToggleSelect").onclick = () => {
      if (!currentModalAct) return;
      const id = currentModalAct.id;
      
      // 追加・削除の切り替え
      if (selectedActMap.has(id)) {
        selectedActMap.delete(id);
      } else {
        selectedActMap.set(id, true);
      }
      
      saveData();
      updateModalButton();
      refreshCurrentView(); // 閉じた後に裏側のUIも更新しておく
    };

    // --- 7. アプリ起動 ---
    window.onload = () => {
      initData();
      loadSavedData();
      switchTab("timetable"); // 初回描画
    };
  </script>
</body>
</html>
