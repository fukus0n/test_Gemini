<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GIRLS GIRLS FESTIVAL 2026 マイタイテ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"M PLUS Rounded 1c"', 'sans-serif'], outfit: ['"Outfit"', 'sans-serif'] } } } };
  </script>
  <style>
    /* 全体構造とスクロールの制御 */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f8fafc; font-family: 'M PLUS Rounded 1c', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { height: 5px; width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .filter-transition { transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* スクロール時のL字固定 ＆ 重ね順の厳密制御 (透け防止の背景色を追加) */
    .z-timeline-now { z-index: 40 !important; }
    .z-timeline-axis { z-index: 30 !important; background-color: #f8fafc !important; }
    .sticky-time-header { z-index: 50 !important; background-color: #f8fafc !important; }
    .stage-header-sticky { z-index: 20 !important; }
  </style>
</head>
<body class="flex flex-col text-slate-800 h-[100dvh]">

  <!-- ヘッダー -->
  <header class="bg-gradient-to-r from-pink-500 via-purple-500 to-orange-400 text-white shadow-sm px-3 py-1.5 flex-none z-30">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-[9px] font-bold bg-white/20 px-1.5 py-0.5 rounded uppercase tracking-wider font-outfit hidden sm:inline-block">GGF 2026</span>
        <!-- 日付切り替えスイッチ -->
        <div class="flex bg-white/20 rounded-md p-0.5 ml-1">
          <button id="day1-btn" onclick="switchDay(1)" class="px-2 py-0.5 rounded text-[10px] font-bold bg-white text-purple-600 shadow-sm transition-all">23日(土)</button>
          <button id="day2-btn" onclick="switchDay(2)" class="px-2 py-0.5 rounded text-[10px] font-bold text-white hover:bg-white/10 transition-all">24日(日)</button>
        </div>
      </div>
      <div id="check-counter" class="bg-white/20 px-2 py-0.5 rounded-full text-[10px] font-bold">選択中: 0枠</div>
    </div>
  </header>

  <!-- タブ -->
  <nav class="bg-white border-b border-slate-200 flex-none z-20 shadow-sm">
    <div class="max-w-7xl mx-auto flex">
      <button id="tab-all" onclick="switchTab('all')" class="flex-1 py-2 text-center font-black text-xs border-b-2 border-purple-600 text-purple-600 transition-all"><i class="fa-solid fa-border-all mr-1"></i>全体タイテ</button>
      <button id="tab-list" onclick="switchTab('list')" class="flex-1 py-2 text-center font-black text-xs border-b-2 border-transparent text-slate-500 transition-all"><i class="fa-solid fa-users mr-1"></i>出演者</button>
      <button id="tab-my" onclick="switchTab('my')" class="flex-1 py-2 text-center font-black text-xs border-b-2 border-transparent text-slate-500 transition-all"><i class="fa-solid fa-star text-amber-500 mr-1"></i>マイタイテ</button>
    </div>
  </nav>

  <main class="flex-1 min-h-0 relative flex flex-col p-2 gap-2">
    <!-- ▼ A. 全体タイムテーブル ▼ -->
    <div id="view-all" class="flex-1 min-h-0 flex flex-col gap-2">
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 flex-none overflow-hidden">
        <div class="px-2.5 py-1.5 flex items-center justify-between text-[11px] gap-2">
          <button onclick="toggleFilterAccordion()" class="flex items-center gap-1 font-bold text-slate-600 hover:text-purple-600 shrink-0 select-none active:scale-95 transition-transform">
            <i class="fa-solid fa-filter text-purple-500"></i><span>エリア <span id="filter-summary-count" class="text-purple-600 font-black text-[10px]">(6)</span></span><i id="filter-chevron" class="fa-solid fa-chevron-down text-[8px] text-slate-400 transition-transform duration-200"></i>
          </button>
          <div class="h-4 w-px bg-slate-200 shrink-0"></div>
          <div class="flex items-center gap-2 flex-1 justify-end min-w-0">
            <button id="realtime-btn" onclick="toggleRealtimeMode()" class="px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 text-slate-600 hover:bg-slate-100 font-bold flex items-center gap-1 transition-all shrink-0 active:scale-95 text-[10px]">
              <i class="fa-regular fa-clock text-slate-400 text-[10px]" id="realtime-icon"></i><span id="realtime-btn-text">現在時刻</span>
            </button>
            <input type="range" id="time-slider" min="570" max="1320" value="720" class="flex-1 min-w-[50px] max-w-[130px] h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-purple-600 transition-opacity" oninput="onSliderInput(this.value)">
            <span id="simulation-time-display" class="font-outfit font-black text-purple-600 bg-purple-50 px-1.5 py-0.5 rounded shrink-0 min-w-[34px] text-center text-[10px]">12:00</span>
          </div>
        </div>
        <!-- 展開フィルター -->
        <div id="filter-content" class="filter-transition max-h-0 overflow-hidden bg-slate-50/50">
          <div class="p-2.5 pt-1 border-t border-slate-100 flex flex-col gap-2 max-h-64 overflow-y-auto custom-scrollbar" id="filter-categories-container"></div>
        </div>
      </div>
      
      <!-- タイムライン表 (w-max min-w-full により赤線が右端まで完全に貫通) -->
      <div class="flex-1 min-h-0 relative bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="w-full h-full overflow-x-auto overflow-y-auto custom-scrollbar scroll-smooth" id="timeline-scroll-container">
          <div class="flex w-max min-w-full relative" id="timeline-grid" style="height: 1850px;">
            <div class="w-10 flex-none border-r border-slate-200 sticky left-0 text-center select-none z-timeline-axis" id="time-axis"></div>
            <div class="flex flex-1 relative w-max min-w-full" id="stage-columns"></div>
            <div id="current-time-line" class="absolute left-0 right-0 border-t border-rose-500 pointer-events-none flex items-center transition-all duration-300 z-timeline-now" style="top: 300px;"><span class="bg-rose-500 text-white font-bold font-outfit text-[8px] py-0.5 rounded-r shadow sticky left-0 w-10 text-center shrink-0">NOW</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ▼ B. 出演者リスト ▼ -->
    <div id="view-list" class="hidden flex-1 min-h-0 flex flex-col gap-2">
      <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-100 flex-none flex items-center gap-2">
        <div class="relative flex-1">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-xs"></i>
          <input type="text" id="artist-search" oninput="onArtistSearch(this.value)" placeholder="アーティスト名、またはヨミガナで検索..." class="w-full bg-slate-50 pl-8 pr-8 py-1.5 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-purple-500">
          <button id="search-clear-btn" onclick="clearArtistSearch()" class="hidden absolute right-2.5 top-2 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-circle-xmark text-sm"></i></button>
        </div>
      </div>
      <div id="artist-directory" class="flex-1 overflow-y-auto custom-scrollbar bg-white rounded-xl border border-slate-100 p-3 pb-12 space-y-4"></div>
    </div>

    <!-- ▼ C. マイタイテ ▼ -->
    <div id="view-my" class="hidden flex-1 min-h-0 flex flex-col gap-2">
      <div class="flex-none flex items-center justify-between bg-white px-3 py-1.5 rounded-xl border border-slate-100 shadow-sm text-xs">
        <div class="flex items-center gap-1 text-slate-500 font-bold select-none"><i class="fa-solid fa-star text-amber-500"></i><span>マイタイムテーブル</span></div>
        <div class="bg-slate-100 p-0.5 rounded-lg flex text-[10px] font-bold select-none">
          <button id="my-style-list-btn" onclick="changeMyStyleView('list')" class="px-2.5 py-1 rounded-md bg-white text-purple-600 shadow-xs transition-all">リスト</button>
          <button id="my-style-grid-btn" onclick="changeMyStyleView('grid')" class="px-2.5 py-1 rounded-md text-slate-500 hover:text-purple-600 transition-all">タイテ(表)</button>
        </div>
      </div>
      <div id="my-empty-state" class="flex-1 flex flex-col items-center justify-center text-slate-400 py-10"><i class="fa-solid fa-calendar-plus text-5xl mb-2 text-slate-200"></i><p class="text-xs font-bold">まだ選択された出番がありません</p></div>
      <div id="my-schedule-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pb-12"></div>
      
      <div id="my-schedule-grid-container" class="hidden flex-1 min-h-0 relative bg-white rounded-xl border border-slate-100 overflow-hidden">
        <div class="w-full h-full overflow-x-auto overflow-y-auto custom-scrollbar scroll-smooth" id="my-grid-scroll-container">
          <div class="flex w-max min-w-full relative" id="my-timeline-grid" style="height: 1850px;">
            <div class="w-10 flex-none border-r border-slate-200 sticky left-0 text-center select-none z-timeline-axis" id="my-time-axis"></div>
            <div class="flex flex-1 relative w-max min-w-full" id="my-stage-columns"></div>
            <div id="my-current-time-line" class="absolute left-0 right-0 border-t border-rose-500 pointer-events-none flex items-center transition-all duration-300 z-timeline-now" style="top: 300px;"><span class="bg-rose-500 text-white font-bold font-outfit text-[8px] py-0.5 rounded-r shadow sticky left-0 w-10 text-center shrink-0">NOW</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- モーダル & トースト -->
  <div id="artist-detail-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-[100] flex items-center justify-center p-4 transition-all duration-200" onclick="closeArtistDetailModal()">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-all duration-200 flex flex-col max-h-[80vh]" onclick="event.stopPropagation()">
      <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-3 flex items-center justify-between shrink-0">
        <div><span class="text-[8px] font-bold bg-white/20 px-1.5 py-0.5 rounded uppercase tracking-wider font-outfit">Artist Schedule</span><h2 id="modal-artist-name" class="text-xs font-black mt-0.5 truncate">アーティスト名</h2></div>
        <button onclick="closeArtistDetailModal()" class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20 active:scale-90 transition-all"><i class="fa-solid fa-xmark text-xs"></i></button>
      </div>
      <div class="p-3 overflow-y-auto custom-scrollbar flex-1 space-y-2" id="modal-schedule-list"></div>
      <div class="bg-slate-50 p-2.5 border-t border-slate-100 flex items-center justify-between text-[9px] text-slate-400 shrink-0 select-none">
        <span>タップで 未選択→★→★★ が切り替わります</span><button onclick="closeArtistDetailModal()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold px-3 py-1.5 rounded-lg active:scale-95 transition-all">閉じる</button>
      </div>
    </div>
  </div>

  <div id="custom-alert" class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 md:w-80 bg-slate-900/95 text-white p-2.5 rounded-lg shadow-xl z-[100] transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none flex items-center justify-between gap-3">
    <div class="flex items-center gap-2"><i class="fa-solid fa-circle-info text-purple-400 text-sm"></i><span class="text-[11px]" id="alert-text">保存されました</span></div>
    <button onclick="dismissAlert()" class="text-slate-400 hover:text-white text-[10px] font-bold">閉じる</button>
  </div>


  <!-- =========================================================
       ロジック部 (出番ごとの選択 ＆ 完全int配列処理)
  ========================================================== -->
  <script>
    // --- 1. グローバル設定・状態 ---
    const startHour = 10, endHour = 22, pxPerMinute = 2.4, headerHeight = 22; 
    
    // システム内部では完全にこれらの配列やMapのみでデータを持ち回ります
    let stageMaster = [];  // [stage_id: int, stage_name: str]
    let artistMaster = []; // [group_id: int, group_name: str, yomi: str]
    let dataDay1 = [];     // [stage_id, [[group_id, sh, sm, eh, em], ...]]
    let dataDay2 = [];
    let stages = [];       // UI装飾用の加工済み配列

    let scheduleDay1 = [];
    let scheduleDay2 = [];
    
    let currentDay = 1, currentSchedules = [], selectedActMap = new Map();
    let activeTab = "all", visibleStageIds = new Set();
    let simulationMinutes = 600, isFilterOpen = false, isRealtimeMode = false, realtimeTimer = null;
    let artistSearchQuery = "", myScheduleStyle = "list", alertTimeout;

    const DAY_BUTTON_BASE = 'px-2 py-0.5 rounded text-[10px] font-bold transition-all';
    const TAB_BUTTON_BASE = 'flex-1 py-2 text-center font-black text-xs border-b-2 transition-all flex items-center justify-center gap-1';
    const DAY_BUTTON_STATE = {
      active: 'bg-white text-purple-600 shadow-sm',
      inactive: 'text-white hover:bg-white/10'
    };

    const $ = (id) => document.getElementById(id);

    // --- 2. ユーティリティ ---
    function formatTime(h, m) { return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`; }
    function saveData() { try { localStorage.setItem("gg_fes_acts", JSON.stringify(Object.fromEntries(selectedActMap))); } catch(e) {} }

    // --- 3. アプリ初期化 ---
    window.onload = function() {
      initData(); // int配列群をデコードしてメモリに展開
      
      currentSchedules = getFlatActs(scheduleDay1); 
      visibleStageIds = new Set(stages.filter(s => s.category === "live").map(s => s.id));
      
      try {
        const saved = JSON.parse(localStorage.getItem("gg_fes_acts"));
        if (saved) Object.entries(saved).forEach(([k, v]) => selectedActMap.set(k, v));
      } catch(e) {}

      initFilterHTML();
      renderStageFilters();
      createTimeAxis("time-axis", true);
      renderGrid();
      updateCounter();
      updateSimulationTime(720);
    };

    // --- 4. UI切り替え系アクション ---
    function switchDay(day) {
      currentDay = day; 
      currentSchedules = getFlatActs(day === 1 ? scheduleDay1 : scheduleDay2);
      $('day1-btn').className = `${DAY_BUTTON_BASE} ${day === 1 ? DAY_BUTTON_STATE.active : DAY_BUTTON_STATE.inactive}`;
      $('day2-btn').className = `${DAY_BUTTON_BASE} ${day === 2 ? DAY_BUTTON_STATE.active : DAY_BUTTON_STATE.inactive}`;
      if(activeTab === 'all') renderGrid(); else if(activeTab === 'list') renderArtistDirectory(); else renderMySchedule();
    }

    function switchTab(tab) {
      activeTab = tab;
      ["all", "list", "my"].forEach(t => {
        $(`tab-${t}`).className = `${TAB_BUTTON_BASE} ${t === tab ? 'border-purple-600 text-purple-600' : 'border-transparent text-slate-500'}`;
        $(`view-${t}`).style.display = t === tab ? 'flex' : 'none';
      });
      if (tab === "all") { renderGrid(); if (isRealtimeMode) setTimeout(scrollToCurrentTime, 100); }
      else if (tab === "list") renderArtistDirectory();
      else if (tab === "my") { renderMySchedule(); if (myScheduleStyle === "grid" && isRealtimeMode) setTimeout(scrollToMyGridCurrentTime, 100); }
    }

    function changeMyStyleView(style) {
      myScheduleStyle = style; const isList = (style === "list");
      document.getElementById("my-style-list-btn").className = `px-2.5 py-1 rounded-md transition-all ${isList ? 'bg-white text-purple-600 shadow-xs' : 'text-slate-500 hover:text-purple-600'}`;
      document.getElementById("my-style-grid-btn").className = `px-2.5 py-1 rounded-md transition-all ${!isList ? 'bg-white text-purple-600 shadow-xs' : 'text-slate-500 hover:text-purple-600'}`;
      document.getElementById("my-schedule-list").classList.toggle("hidden", !isList);
      document.getElementById("my-schedule-grid-container").classList.toggle("hidden", isList);
      if (!isList) renderMyGrid();
    }

    function updateCounter() { $('check-counter').innerText = `選択中: ${selectedActMap.size}枠`; }

    function showToast(text) {
      const box = $('custom-alert'); $('alert-text').innerText = text;
      box.classList.remove("translate-y-24", "opacity-0"); box.classList.add("translate-y-0", "opacity-100");
      clearTimeout(alertTimeout); alertTimeout = setTimeout(() => dismissAlert(), 2500);
    }
    function dismissAlert() { $('custom-alert').classList.add('translate-y-24', 'opacity-0'); }

    // --- 5. フィルター操作 ---
    function toggleFilterAccordion() {
      isFilterOpen = !isFilterOpen;
      $('filter-content').style.maxHeight = isFilterOpen ? '300px' : '0px';
      $('filter-chevron').classList.toggle('rotate-180', isFilterOpen);
    }

    function initFilterHTML() {
      const categories = [ { id: 'live', label: '🎤 ライブステージ' }, { id: 'tokuten', label: '🤝 特典会エリア' }, { id: 'ennichi', label: '🏮 縁日エリア' } ];
      let html = '';
      categories.forEach(cat => {
        html += `<div><div class="flex items-center justify-between text-[10px] text-slate-500 font-black mb-1 select-none"><span>${cat.label}</span><div class="flex gap-2"><button onclick="toggleCategoryStages('${cat.id}', true)" class="text-purple-600 font-bold hover:underline">ON</button><button onclick="toggleCategoryStages('${cat.id}', false)" class="text-purple-600 font-bold hover:underline">OFF</button></div></div><div class="flex flex-wrap gap-1 ${cat.id !== 'live' ? 'p-1 bg-slate-100/50 rounded-lg' : ''}" id="${cat.id}-stage-filters"></div></div><div class="h-px bg-slate-200 last:hidden"></div>`;
      });
      $('filter-categories-container').innerHTML = html;
    }

    function renderStageFilters() {
      const containers = { live: document.getElementById("live-stage-filters"), tokuten: document.getElementById("tokuten-stage-filters"), ennichi: document.getElementById("ennichi-stage-filters") };
      Object.values(containers).forEach(c => c.innerHTML = "");
      stages.forEach(s => {
        const isVisible = visibleStageIds.has(s.id);
        const btn = document.createElement("button");
        btn.onclick = () => { if(isVisible && visibleStageIds.size > 1) visibleStageIds.delete(s.id); else visibleStageIds.add(s.id); renderStageFilters(); renderGrid(); };
        btn.className = `px-2 py-0.5 rounded-full text-[9px] font-black transition-all flex items-center gap-1 shrink-0 ${isVisible ? s.accent+' text-white shadow-sm' : 'bg-white text-slate-500 hover:bg-slate-100 border border-slate-200'}`;
        btn.innerHTML = `<span class="w-1 h-1 rounded-full ${isVisible ? 'bg-white' : s.accent}"></span>${s.name.replace(" STAGE","").replace("特典会 ","").replace("縁日 ","")}`;
        if(containers[s.category]) containers[s.category].appendChild(btn);
      });
      document.getElementById("filter-summary-count").innerText = `(${visibleStageIds.size}/${stages.length} エリア選択中)`;
    }

    function toggleCategoryStages(cat, force) {
      stages.filter(s => s.category === cat).forEach(s => { if (force) visibleStageIds.add(s.id); else if (visibleStageIds.size > 1) visibleStageIds.delete(s.id); });
      renderStageFilters(); renderGrid();
    }

    // --- 6. 出番単位の選択 ＆ モーダル ---
    function toggleActSelect(actId) {
      const allActs = getFlatActs(scheduleDay1).concat(getFlatActs(scheduleDay2));
      const act = allActs.find(a => a.id === actId);
      if (!act) return;
      
      const level = selectedActMap.get(actId) || 0;
      const name = artistMaster.find(m => m[0] === act.groupId)[1];
      const timeStr = formatTime(act.sh, act.sm);

      if (level === 0) { selectedActMap.set(actId, 1); showToast(`「${name} (${timeStr})」を追加しました`); }
      else if (level === 1) { selectedActMap.set(actId, 2); showToast(`「${name} (${timeStr})」を【最優先(★★)】に！`); }
      else { selectedActMap.delete(actId); showToast(`「${name} (${timeStr})」を外しました`); }
      
      saveData(); updateCounter(); 
      if (activeTab === 'all') renderGrid(); 
      else if (activeTab === 'list') renderArtistDirectory(); 
      else renderMySchedule();
    }

    function showArtistDetailModal(groupId) {
      const name = artistMaster.find(m => m[0] === groupId)[1];
      document.getElementById("modal-artist-name").innerText = name;
      renderModalScheduleList(groupId);
      const modal = document.getElementById("artist-detail-modal");
      modal.classList.remove("hidden");
      setTimeout(() => { modal.firstElementChild.classList.remove("scale-95"); modal.firstElementChild.classList.add("scale-100"); }, 10);
    }

    function closeArtistDetailModal() {
      const modal = document.getElementById("artist-detail-modal");
      modal.firstElementChild.classList.remove("scale-100"); modal.firstElementChild.classList.add("scale-95");
      setTimeout(() => { modal.classList.add("hidden"); }, 150);
    }

    function renderModalScheduleList(groupId) {
      const listContainer = document.getElementById("modal-schedule-list");
      listContainer.innerHTML = "";
      
      const allActs = getFlatActs(scheduleDay1).concat(getFlatActs(scheduleDay2)).filter(a => a.groupId === groupId).sort((a, b) => a.startMin - b.startMin);

      allActs.forEach(act => {
        const stage = stages.find(s => s.id === act.stageId);
        const level = selectedActMap.get(act.id) || 0;
        const item = document.createElement("div");
        item.className = `p-3 rounded-xl border flex items-center justify-between gap-3 transition-all cursor-pointer ${level > 0 ? 'bg-amber-50 border-amber-300' : 'bg-slate-50 border-slate-100 hover:bg-slate-100/80'}`;
        item.onclick = () => { toggleActSelect(act.id); renderModalScheduleList(groupId); };

        const icon = stage.category === "live" ? "🎤" : (stage.category === "tokuten" ? "🤝" : "🏮");
        const stars = level === 2 ? `<i class="fa-solid fa-star text-xs"></i><i class="fa-solid fa-star text-xs ml-px"></i>` : (level === 1 ? `<i class="fa-solid fa-star text-xs"></i>` : `<span class="w-2 h-2 rounded-full border border-current bg-transparent shrink-0"></span>`);
        const btnClass = level === 2 ? "bg-amber-400 text-white border-amber-500 shadow-sm px-2.5" : (level === 1 ? "bg-amber-200 text-amber-600 border-amber-300 w-8" : "bg-white text-slate-300 border-slate-200 w-8");
        const dayStr = act.id.startsWith('d1') ? '[23日]' : '[24日]';

        item.innerHTML = `
          <div class="flex items-center gap-3 min-w-0 flex-1 pointer-events-none">
            <div class="text-center shrink-0">

    // --- 7. 描画共通関数・アルゴリズム ---
    function getFlatActs(dataArray) {
      const flat = [];
      const prefix = dataArray === scheduleDay1 ? 'd1' : 'd2';
      dataArray.forEach(stageData => {
        const stageId = stageData[0];
        stageData[1].forEach(act => {
          const [groupId, sh, sm, eh, em] = act;
          flat.push({
            id: `${prefix}_${stageId}_${groupId}_${sh}${sm}`, // 画面切り替え用のユニークID
            stageId, groupId, sh, sm, eh, em,
            startMin: (sh * 60 + sm) - (startHour * 60),
            endMin: (eh * 60 + em) - (startHour * 60)
          });
        });
      });
      return flat;
    }

    function createTimeAxis(containerId, hasHeader) {
      const axis = document.getElementById(containerId); axis.innerHTML = "";
      const spacer = document.createElement("div"); 
      spacer.className = `border-b border-slate-200 select-none sticky top-0 ${hasHeader ? 'sticky-time-header' : 'z-timeline-now'}`; 
      spacer.style.height = hasHeader ? `${headerHeight}px` : "0px"; 
      spacer.innerText = hasHeader ? "TIME" : ""; 
      axis.appendChild(spacer);
      
      for (let m = 0; m <= (endHour - startHour) * 60; m += 30) {
        const tick = document.createElement("div"); 
        tick.className = "absolute right-1 text-slate-400 font-outfit text-[9.5px] font-black select-none pointer-events-none"; 
        tick.style.top = `${m * pxPerMinute + (hasHeader ? headerHeight : 0)}px`; 
        tick.innerText = `${String(startHour + Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`; 
        axis.appendChild(tick);
      }
    }

    function setupCardEvents(card, actId, groupId, isMyGrid) {
      let timer = null, hold = false, startX = 0, startY = 0;
      card.onpointerdown = e => { 
        if(e.button !== 0 && e.pointerType === 'mouse') return; 
        hold = false; startX = e.clientX; startY = e.clientY; 
        timer = setTimeout(() => { hold = true; showArtistDetailModal(groupId); }, 500); 
      };
      card.onpointermove = e => { if(timer && Math.hypot(e.clientX - startX, e.clientY - startY) > 10) { clearTimeout(timer); timer = null; } };
      card.onpointerup = () => { if(timer) { clearTimeout(timer); timer = null; } if(!hold) { toggleActSelect(actId); if(isMyGrid) renderMyGrid(); } };
      card.onpointercancel = () => { if(timer) { clearTimeout(timer); timer = null; } };
    }

    // 動的重複回避パッキング (星2を優先・列数最小化)
    function packActsAlgorithm(acts) {
      const pack = (list) => {
        const columns = [];
        list.forEach(act => {
          let placed = false;
          for (let col of columns) {
            if (!col.some(placedAct => act.startMin < placedAct.endMin && act.endMin > placedAct.startMin)) { col.push(act); placed = true; break; }
          }
          if (!placed) columns.push([act]);
        });
        return columns;
      };
      const sorted = [...acts].sort((a, b) => a.startMin - b.startMin);
      const colsA = pack(sorted);
      
      const highPriority = sorted.filter(e => selectedActMap.get(e.id) === 2);
      const lowPriority = sorted.filter(e => selectedActMap.get(e.id) === 1);
      const colsB = pack([...highPriority, ...lowPriority]);
      
      return colsB.length <= colsA.length ? colsB : colsA;
    }

      const groups = { "あ行":[], "か行":[], "さ行":[], "た行":[], "な行":[], "は行":[], "ま行":[], "や行":[], "ら行":[], "わ行":[] };

    function toggleRealtimeMode() {

        syncWithRealTime(); realtimeTimer = setInterval(syncWithRealTime, 1000); showToast("現在時刻に自動同期しました");

    function syncWithRealTime() {
